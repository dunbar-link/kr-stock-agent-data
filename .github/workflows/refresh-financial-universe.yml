name: Refresh financial universe

on:
  workflow_dispatch:
  schedule:
    - cron: "20 8 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build daily snapshot
        run: |
          python scripts/build_market_snapshot.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add financial-universe-real.json
          git diff --cached --quiet || git commit -m "chore: refresh financial universe"
          git push